<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaera - Shared Living Expense Sharing App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #F7F4EF 0%, #F0EBE3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(62, 60, 55, 0.1);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #3E3C37;
            font-size: 32px;
            margin-bottom: 12px;
        }
        p {
            color: #3E3C37;
            opacity: 0.7;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        a {
            color: #3F8E8E;
            text-decoration: none;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #3F8E8E10;
        }
        a:hover {
            background: #3F8E8E20;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 40px;
            color: #3E3C37;
            opacity: 0.5;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>Zaera</h1>
        <p>Smart expense sharing for shared living spaces. Split bills, track expenses, and live harmoniously.</p>
        <div class="links">
            <a href="/Zaera.app/privacy">📜 Privacy Policy</a>
            <a href="/Zaera.app/terms">📋 Terms of Service</a>
            <a href="/Zaera.app/support">💬 Contact Support</a>
        </div>
        <div class="footer">
            © 2026 Zaera, Inc. All rights reserved.
        </div>
    </div>
</body>
</html>
